services:
  sentence-reader:
    build: .
    init: true
    ports:
      - "4173:4173"
    environment:
      HOST: 0.0.0.0
      PORT: 4173
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:4173/api/health').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
